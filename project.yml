name: TinyWins
options:
  bundleIdPrefix: com.christianafram
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  TinyWins:
    type: application
    platform: iOS
    sources:
      - path: TinyWins
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.christianafram.tinywins
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Tiny Wins"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  TinyWinsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TinyWinsTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: TinyWins
  TinyWinsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TinyWinsUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: TinyWins
schemes:
  TinyWins:
    build:
      targets:
        TinyWins: all
        TinyWinsTests: [test]
        TinyWinsUITests: [test]
    test:
      targets:
        - TinyWinsTests
        - TinyWinsUITests
    run:
      config: Debug
