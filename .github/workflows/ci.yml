name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Check PrivacyInfo.xcprivacy exists
        run: test -f TinyWins/Resources/PrivacyInfo.xcprivacy

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint

      - name: Find an available iOS Simulator
        id: destination
        run: |
          set -e
          xcodebuild -downloadPlatform iOS || true

          NAME=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys

          data = json.load(sys.stdin)
          for runtime, devices in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for device in devices:
                  if device["name"].startswith("iPhone"):
                      print(device["name"])
                      sys.exit(0)
          ')

          if [ -z "$NAME" ]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build and test
        run: |
          xcodebuild test \
            -project TinyWins.xcodeproj \
            -scheme TinyWins \
            -destination "platform=iOS Simulator,name=${{ steps.destination.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO
